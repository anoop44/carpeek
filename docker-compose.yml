services:
  postgres:
    image: postgres:15-alpine
    container_name: autocorrect_postgres
    restart: always
    env_file:
      - .env.${ENV:-local}
    environment:
      POSTGRES_DB: autocorrect_db
      POSTGRES_USER: autocorrect_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: autocorrect-backend
    container_name: autocorrect_backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.${ENV:-local}
    environment:
      DATABASE_URL: postgres://autocorrect_user:${DB_PASSWORD:-password}@postgres:5432/autocorrect_db?sslmode=disable
      PORT: ${PORT}
      BASE_URL: ${BASE_URL}
    depends_on:
      - postgres
    volumes:
      - ./backend/migrations:/app/migrations
      - ./images:/app/images  # Volume for storing car images

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: autocorrect_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.${ENV:-local}
    environment:
      - BACKEND_API_URL=http://backend:8080
      - PORT=3000
    depends_on:
      - backend

volumes:
  postgres_data: