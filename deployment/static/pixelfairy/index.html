<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PLACE YOUR GOOGLE ADSENSE VERIFICATION META TAG HERE -->
    <!-- Example: <meta name="google-adsense-account" content="ca-pub-XXXXXXXXXXXXXXXX"> -->
    
    <title>Pixel Fairy | Design & Development</title>
    <style>
        body {
            background-color: #0a0c12;
            color: #f6f6f8;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 2rem;
            border: 1px solid rgba(19, 91, 236, 0.3);
            border-radius: 1rem;
            background: rgba(25, 34, 51, 0.7);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(19, 91, 236, 0.1);
        }
        h1 {
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #94a3b8;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
        }
        .dot {
            height: 8px;
            width: 8px;
            background-color: #135bec;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #135bec;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pixel Fairy</h1>
        <p><span class="dot"></span>Creative Studio & Development Lab</p>
    </div>
</body>
</html>
